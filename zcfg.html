<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广播电视安全播出文件管理系统</title>
    <style>
        :root {
            --sidebar-bg: #2c3e50;
            --sidebar-hover: #3e4f5f;
            --active-blue: #3498db;
            --text-color: #bdc3c7;
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1a252f;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 25px 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            background-color: #1a252f;
            border-bottom: 1px solid #34495e;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .file-item {
            display: block;
            padding: 15px 25px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 14px;
            border-left: 4px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .file-item:hover {
            background-color: var(--sidebar-hover);
            color: white;
        }

        .file-item.active {
            background-color: #34495e;
            color: white;
            border-left-color: var(--active-blue);
        }

        /* 右侧 PDF 展示区 */
        .viewer-main {
            flex: 1;
            background-color: #525659;
            display: flex;
            flex-direction: column;
        }

        #pdf-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading-tip {
            position: absolute;
            top: 50%;
            left: 60%;
            transform: translate(-50%, -50%);
            color: #999;
            z-index: -1;
        }
    </style>
</head>
<body>

<div class="container">
    <nav class="sidebar">
        <div class="sidebar-header">湖北省广播电视局恩施中波转播台规章制度库</div>
        <div class="file-list">
            <a href="javascript:void(0)" class="file-item active" onclick="loadPDF('pdf/1.pdf', this)">1. 广播电视安全播出管理规定 (62号令)</a>
            <a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/2.pdf', this)">2. 恩施台机房应急预案</a>
            <a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/3.pdf', this)">3.恩施台雷暴天气安全播出应急预案</a>
            <a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/4.pdf', this)">4. 恩施台强降雨天气安全播出应急预案</a>
            <a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/5.pdf', this)">5. 空</a>
            <a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/6.pdf', this)">6. 空</a>
            <a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/7.pdf', this)">7. 空</a>
            <a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/8.pdf', this)">8. 空</a>
            <a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/9.pdf', this)">9. 空</a>
            <a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/10.pdf', this)">10. 空</a>
<a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/10.pdf', this)">11. 空</a>
<a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/10.pdf', this)">12. 空</a>
<a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/10.pdf', this)">13. 空</a>
<a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/10.pdf', this)">14. 空</a>
<a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/10.pdf', this)">15. 空</a>
<a href="javascript:void(0)" class="file-item" onclick="loadPDF('pdf/10.pdf', this)">16. 空</a>
        </div>
    </nav>

    <main class="viewer-main">
        <div class="loading-tip">正在加载文件...</div>
        <iframe id="pdf-frame" src="pdf/1.pdf" type="application/pdf"></iframe>
    </main>
</div>

<script>
    /**
     * 加载PDF文件并更新导航状态
     * @param fileName 文件名（1.pdf, 2.pdf 等）
     * @param element 点击的DOM元素
     */
    function loadPDF(fileName, element) {
        // 1. 获取iframe元素
        const frame = document.getElementById('pdf-frame');
        
        // 2. 更新iframe的源地址
        // 提示：此处假设PDF文件与HTML文件在同一目录下
        frame.src = fileName;

        // 3. 更新侧边栏高亮状态
        const items = document.querySelectorAll('.file-item');
        items.forEach(item => item.classList.remove('active'));
        element.classList.add('active');
    }
</script>

</body>
</html>
